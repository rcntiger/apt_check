<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>금천구 아파트 조사 대상</title>
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#21262d;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);
  --tx:#e6edf3;--mt:#7d8590;
  --ac:#2f81f7;--hi:#ff7b72;--lo:#3fb950;
  --t1:#f59e0b;--t2:#ef4444;--t3:#a78bfa;
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 16px;background:var(--sur);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:28px;height:28px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
h1{font-size:14px;font-weight:600}
.badge{font-size:10px;padding:2px 8px;border-radius:20px}
.badge.sub{background:rgba(47,129,247,.12);border:1px solid rgba(47,129,247,.3);color:var(--ac)}
.badge.cnt{margin-left:auto;background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--lo)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:600px){.layout{flex-direction:column}.sidebar{width:100%;height:50vh;border-right:none;border-bottom:1px solid var(--bd)}}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
.map-ph{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--mt);font-size:13px}
.map-ph .big{font-size:36px;opacity:.25}
.panel{padding:10px 12px;border-bottom:1px solid var(--bd)}
.ptitle{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mt);margin-bottom:7px}
.key-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.key-row label{font-size:11px;color:var(--mt);width:48px;flex-shrink:0}
.key-row input{flex:1;background:var(--sur2);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;padding:6px 8px;font-size:11px;font-family:monospace;outline:none}
.key-row input:focus{border-color:var(--ac)}
.go-btn{width:100%;padding:9px;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;background:var(--ac);color:#fff}
.go-btn:hover{filter:brightness(1.1)}
.go-btn:disabled{background:var(--sur2);color:var(--mt);cursor:not-allowed}
.pgwrap{height:3px;background:var(--sur2);border-radius:2px;overflow:hidden;margin-top:7px;display:none}
.pgfill{height:100%;background:var(--ac);border-radius:2px;transition:width .1s;width:0}
.pglabel{font-size:10px;color:var(--mt);margin-top:4px;text-align:center;display:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stats-row{display:flex;gap:4px}
.stat{flex:1;background:var(--sur2);border-radius:6px;padding:6px 4px;text-align:center}
.stat .n{font-size:14px;font-weight:700}
.stat .l{font-size:9px;color:var(--mt);margin-top:1px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{padding:4px 9px;border-radius:20px;border:1px solid var(--bd2);background:var(--sur2);color:var(--mt);font-size:11px;cursor:pointer;transition:all .12s;user-select:none}
.fbtn.active{color:#fff;border-color:transparent}
.fall.active{background:var(--ac)}
.ft1.active{background:var(--t1);color:#111}
.ft2.active{background:var(--t2)}
.ft3.active{background:var(--t3)}
.fd.active{background:var(--dc,var(--ac))}
.dcnt{opacity:.7;font-size:10px;margin-left:1px}
.search-wrap input{width:100%;background:var(--sur2);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;padding:7px 9px;font-size:12px;outline:none}
.search-wrap input:focus{border-color:var(--ac)}
.list{flex:1;overflow-y:auto;padding:5px}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.item{padding:7px 10px;border-radius:var(--r);margin-bottom:3px;cursor:pointer;transition:all .12s;display:flex;align-items:flex-start;gap:7px;border:1px solid transparent}
.item:hover{background:var(--sur2)}
.item.active{background:rgba(47,129,247,.1);border-color:rgba(47,129,247,.25)}
.item.hidden{display:none}
.item.done .iname{color:#22c55e}
.item.done .done-badge{display:inline}
.team-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ibody{flex:1;min-width:0}
.iname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.isub{font-size:10px;color:var(--mt);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tags{margin-top:3px;display:flex;gap:3px;flex-wrap:wrap}
.itag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.itag.t1{background:rgba(245,158,11,.15);color:var(--t1)}
.itag.t2{background:rgba(239,68,68,.15);color:var(--t2)}
.itag.t3{background:rgba(167,139,250,.15);color:var(--t3)}
.itag.err{background:rgba(255,123,114,.1);color:var(--hi)}
.itag.dong{background:rgba(255,255,255,.07);color:var(--mt)}
.done-badge{display:none;font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(34,197,94,.15);color:#22c55e;font-weight:600}
.toast{position:fixed;bottom:16px;right:16px;background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:9px 14px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:9999;transform:translateY(50px);opacity:0;transition:all .25s;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--lo)}.toast.err{border-color:var(--hi)}
.kk-marker{width:11px;height:11px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.6);cursor:pointer;transition:all .2s}
/* 지도 툴바 */
.map-toolbar{position:absolute;top:10px;right:10px;z-index:100;display:flex;flex-direction:column;gap:6px}
.tool-btn{padding:7px 12px;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;background:var(--sur);color:var(--tx);border:1px solid var(--bd2);box-shadow:0 2px 8px rgba(0,0,0,.4);transition:all .15s;white-space:nowrap}
.tool-btn:hover{background:var(--sur2)}
.tool-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.tool-btn.active-rv{background:#22c55e;color:#fff;border-color:#22c55e}
/* 거리재기 안내 */
.dist-info{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:8px 16px;font-size:12px;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.5);text-align:center}
.dist-info span{color:var(--ac);font-weight:700;font-size:14px}
/* 로드뷰 패널 */
.rv-panel{position:absolute;inset:0;z-index:200;display:none;flex-direction:column}
.rv-header{background:var(--sur);border-bottom:1px solid var(--bd);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.rv-title{font-size:13px;font-weight:600;flex:1}
.rv-close{background:none;border:none;color:var(--mt);cursor:pointer;font-size:18px;line-height:1}
#rvMap{flex:1}
.kk-marker:hover{transform:scale(1.5)}
.kk-marker.t1{background:var(--t1)}
.kk-marker.t2{background:var(--t2)}
.kk-marker.t3{background:var(--t3)}
.kk-marker.done{background:#22c55e !important;width:13px !important;height:13px !important}
/* 진단 패널 */
#diagPanel{display:none;position:absolute;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;padding:24px}
.diag-box{background:var(--sur);border:1px solid rgba(255,123,114,.35);border-radius:14px;padding:24px 28px;max-width:460px;width:100%}
.diag-title{font-size:15px;font-weight:700;color:var(--hi);margin-bottom:10px}
.diag-desc{font-size:13px;color:var(--mt);margin-bottom:14px;line-height:1.6}
.diag-fix{background:var(--sur2);border-radius:8px;padding:14px 16px;font-size:12px;line-height:2.2;color:var(--tx)}
.diag-origin{margin-top:12px;padding:10px 14px;background:rgba(47,129,247,.08);border:1px solid rgba(47,129,247,.2);border-radius:8px;font-size:11px;color:var(--mt)}
.diag-close{margin-top:12px;width:100%;padding:9px;background:var(--sur2);border:1px solid var(--bd2);border-radius:8px;color:var(--mt);cursor:pointer;font-size:12px}
/* 완료버튼 */
.complete-btn{width:100%;margin-top:10px;padding:7px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:#22c55e;color:#fff}
.complete-btn:hover{background:#16a34a}
.complete-btn.undone{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.complete-btn.undone:hover{background:#fee2e2;color:#ef4444;border-color:#fca5a5}
</style>
</head>
<body>
<header>
  <div class="logo">🚒</div>
  <h1>금천구 아파트 조사 대상</h1>
  <span class="badge sub">서울 금천구</span>
  <span class="badge cnt">167개소</span>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="panel">
      <div class="ptitle">🔑 Kakao API 키</div>
      <div class="key-row"><label>JS 키</label><input type="text" id="jsKey" placeholder="JavaScript 키"></div>
      <div class="key-row"><label>REST 키</label><input type="text" id="restKey" placeholder="REST API 키"></div>
      <button class="go-btn" id="goBtn" onclick="startLoad()">🗺️ 지도에 표시</button>
      <div class="pgwrap" id="pgWrap"><div class="pgfill" id="pgFill"></div></div>
      <div class="pglabel" id="pgLabel"></div>
    </div>

    <div class="panel" id="statsPanel" style="display:none">
      <div class="stats-row">
        <div class="stat"><div class="n" id="sTotal" style="color:var(--ac)">0</div><div class="l">전체</div></div>
        <div class="stat"><div class="n" id="sOk" style="color:var(--lo)">0</div><div class="l">변환</div></div>
        <div class="stat"><div class="n" id="sFail" style="color:var(--hi)">0</div><div class="l">실패</div></div>
        <div class="stat"><div class="n" id="doneCount" style="color:#22c55e">0</div><div class="l">조사완료</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle">📍 행정동</div>
      <div class="filter-row">
        <span class="fbtn fall active" id="dbtn-all" onclick="toggleDong('all')">전체</span>
        <span class="fbtn fd" id="dbtn-독산동" onclick="toggleDong('독산동')" style="--dc:#60a5fa">독산동 <span class="dcnt" id="dcnt-독산동"></span></span>
        <span class="fbtn fd" id="dbtn-가산동" onclick="toggleDong('가산동')" style="--dc:#34d399">가산동 <span class="dcnt" id="dcnt-가산동"></span></span>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle">👥 조사팀</div>
      <div class="filter-row">
        <span class="fbtn fall active" id="tbtn-all" onclick="toggleTeam('all')">전체</span>
        <span class="fbtn ft1" id="tbtn-1팀" onclick="toggleTeam('1팀')">🟡 1팀 <span class="dcnt" id="tcnt-1팀"></span></span>
        <span class="fbtn ft2" id="tbtn-2팀" onclick="toggleTeam('2팀')">🔴 2팀 <span class="dcnt" id="tcnt-2팀"></span></span>
        <span class="fbtn ft3" id="tbtn-3팀" onclick="toggleTeam('3팀')">🟣 3팀 <span class="dcnt" id="tcnt-3팀"></span></span>
      </div>
    </div>

    <div class="panel">
      <div class="ptitle">🔍 검색</div>
      <div class="search-wrap"><input type="text" id="searchInput" placeholder="단지명 검색..." oninput="applyFilter()"></div>
    </div>

    <div class="list" id="listEl">
      <div style="text-align:center;color:var(--mt);font-size:12px;padding:24px 12px;line-height:1.9">
        API 키 입력 후<br>[지도에 표시] 버튼을 누르세요<br>
        <span style="font-size:10px;color:#444">167건 · 자동 캐싱</span>
      </div>
    </div>
  </div>

  <div class="map-wrap">
    <div class="map-ph" id="mapPh"><div class="big">🗺️</div><div>API 키 입력 후 버튼을 누르세요</div></div>
    <div id="map"></div>
    <!-- 지도 툴바 -->
    <div class="map-toolbar" id="mapToolbar" style="display:none">
      <button class="tool-btn" id="btnDist" onclick="toggleDist()">📏 거리재기</button>
      <button class="tool-btn" id="btnRv" onclick="openRvMode()">🔭 로드뷰</button>
      <button class="tool-btn" id="btnDistClear" onclick="clearDist()" style="display:none;font-size:11px;color:var(--hi)">✕ 초기화</button>
    </div>
    <!-- 거리재기 안내 -->
    <div class="dist-info" id="distInfo">
      클릭: 측정점 추가 &nbsp;|&nbsp; 더블클릭: 완료<br>
      총 거리: <span id="distVal">0</span> m
    </div>
    <!-- 로드뷰 패널 -->
    <div class="rv-panel" id="rvPanel">
      <div class="rv-header">
        <span class="rv-title">🔭 로드뷰</span>
        <span style="font-size:11px;color:var(--mt)" id="rvHint">지도에서 위치를 클릭하세요</span>
        <button onclick="closeRv()" style="padding:6px 14px;background:#ef4444;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-left:auto">← 지도로 돌아가기</button>
      </div>
      <div id="rvMap"></div>
    </div>
    <div id="diagPanel">
      <div class="diag-box">
        <div class="diag-title" id="diagTitle"></div>
        <div class="diag-desc" id="diagDesc"></div>
        <div class="diag-fix" id="diagFix"></div>
        <div class="diag-origin">현재 접속 주소: <code style="color:var(--ac)" id="diagOrigin"></code></div>
        <button class="diag-close" onclick="document.getElementById('diagPanel').style.display='none'">닫기</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

// ── 주소 정제 ──
function cleanRoad(r) {
  r = r.trim();
  r = r.replace(/\s*[（(（].*/,'');
  r = r.replace(/\s+[가-힣]{2,}.+$/,'');
  r = r.replace(/\s+\d+동$/,'').replace(/\s+\d+호$/,'');
  return r.trim();
}
function cleanJibun(a) {
  a = a.replace(/\s+/g,' ').trim();
  a = a.replace(/\s*외\s*\d+필지.*/,'');
  a = a.replace(/(\d+-\d+)\s*산$/,'산$1');
  a = a.replace(/(\d+)-0\b/,'$1');
  a = a.replace(/\s*[,(（*].*/,'');
  return a.trim();
}

// ── Kakao REST ──
async function kakaoAddr(q,key){ const r=await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(q)}&size=1`,{headers:{Authorization:`KakaoAK ${key}`}}); if(!r.ok)return null; const d=await r.json(); return d.documents?.[0]?{lat:+d.documents[0].y,lng:+d.documents[0].x}:null; }
async function kakaoKw(q,key){ const r=await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(q)}&size=1`,{headers:{Authorization:`KakaoAK ${key}`}}); if(!r.ok)return null; const d=await r.json(); return d.documents?.[0]?{lat:+d.documents[0].y,lng:+d.documents[0].x}:null; }

async function geocodeOne(d,key) {
  const rd = cleanRoad(d.addr_road);
  if (rd) { const g=await kakaoAddr('서울 금천구 '+rd,key); if(g)return g; }
  const g2=await kakaoAddr(cleanJibun(d.addr),key); if(g2)return g2;
  const nm=d.name.replace(/[（(].*/,'').trim();
  return await kakaoKw('서울 금천구 '+nm,key);
}

// ── 지도 ──
function initKakaoMap(jsKey) {
  if (kakaoMap) return Promise.resolve();
  return new Promise((resolve,reject) => {
    const timer = setTimeout(()=>reject(new Error('TIMEOUT')),10000);
    const s = document.createElement('script');
    s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${jsKey}&autoload=false&libraries=services`;
    s.onerror = ()=>{ clearTimeout(timer); reject(new Error('SCRIPT_LOAD')); };
    s.onload = ()=>{
      try {
        kakao.maps.load(()=>{
          clearTimeout(timer);
          try {
            document.getElementById('mapPh').style.display='none';
            kakaoMap = new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(37.463,126.900),level:5});
            document.getElementById('mapToolbar').style.display='flex';
            setupMapClickListener();
            resolve();
          } catch(e){reject(new Error('MAP_CREATE'));}
        });
      } catch(e){clearTimeout(timer);reject(new Error('SDK_LOAD'));}
    };
    document.head.appendChild(s);
  });
}

    'SCRIPT_LOAD':{title:'JavaScript 키 오류 또는 도메인 미등록',desc:'403 오류: JS 키 확인 또는 도메인 등록 후 저장 버튼 클릭',fix:`developers.kakao.com → 플랫폼 키 → JS 키 수정<br>SDK 도메인: <b>${origin}</b>`},
    'MAP_CREATE':{title:'지도 생성 실패',desc:'',fix:'페이지 새로고침 후 다시 시도하세요.'},
  };
  const m=msgs[code]||{title:'오류: '+code,desc:'',fix:'새로고침하세요.'};
  document.getElementById('diagTitle').textContent='⚠️ '+m.title;
  document.getElementById('diagDesc').textContent=m.desc;

  document.getElementById('diagOrigin').textContent=origin;
  document.getElementById('diagPanel').style.display='flex';
}

// ── 메인 ──
async function startLoad() {
  const jsKey=document.getElementById('jsKey').value.trim();
  const restKey=document.getElementById('restKey').value.trim();
  if(!jsKey||!restKey){showToast('API 키를 입력하세요','err');return;}
  document.getElementById('goBtn').disabled=true;
  document.getElementById('pgWrap').style.display='block';
  document.getElementById('pgLabel').style.display='block';
  document.getElementById('statsPanel').style.display='block';
  document.getElementById('listEl').innerHTML='';
  try { await initKakaoMap(jsKey); }
  catch(e) {
    document.getElementById('goBtn').disabled=false;
    document.getElementById('pgWrap').style.display='none';
    document.getElementById('pgLabel').style.display='none';
    document.getElementById('statsPanel').style.display='none';
    showDiag(e.message); return;
  }
  const cache=loadCache();
  let ok=0,fail=0;
  for(let i=0;i<RAW.length;i++){
    const d=RAW[i];
    document.getElementById('pgFill').style.width=((i+1)/RAW.length*100)+'%';
    document.getElementById('pgLabel').textContent=`${i+1}/${RAW.length} [${d.team}] ${d.name}`;
    document.getElementById('sTotal').textContent=i+1;
    const ck=String(d.seq);
    let geo=null;
    if(cache[ck]){geo=cache[ck]==='fail'?null:cache[ck];}
    else{try{geo=await geocodeOne(d,restKey);}catch{}; cache[ck]=geo||'fail'; if(i%10===0)saveCache(cache); await sleep(80);}
    geocoded[i]=geo;
    if(geo){ok++;addMarker(i,geo.lat,geo.lng,d);}else fail++;
    renderItem(d,i,!!geo);
    document.getElementById('sOk').textContent=ok;
    document.getElementById('sFail').textContent=fail;
  }
  saveCache(cache);
  document.getElementById('pgWrap').style.display='none';
  document.getElementById('pgLabel').style.display='none';
  document.getElementById('goBtn').disabled=false;
  // 완료 상태 복원
  const doneMap=loadDone();
  RAW.forEach((_,i)=>{ if(doneMap[String(RAW[i].seq)])applyDoneState(i,true); });
  updateDoneCount();
  applyFilter();
  fitAll();
  showToast(`완료 ✓ ${ok}개 성공 / ${fail}개 실패`,ok>fail?'ok':'err');
}

  iwEl.style.cssText='background:#fff;border-radius:8px;padding:10px 14px;min-width:210px;box-shadow:0 4px 16px rgba(0,0,0,.2);font-family:sans-serif;position:relative';
  iwEl.innerHTML=`
    <div style="font-size:9px;font-weight:700;color:${color};margin-bottom:4px">${d.team} 조사대상</div>
    <div style="font-size:13px;font-weight:700;margin-bottom:6px;color:#111;padding-right:18px">${esc(d.name)}</div>
    <div style="font-size:11px;color:#666;margin-bottom:2px">📍 ${d.dong} · ${d.floors} · ${d.buildings}동</div>
    ${rdClean?`<div style="font-size:11px;color:#555;margin-bottom:2px">🛣 ${esc(rdClean)}</div>`:''}
    <div style="font-size:10px;color:#999">${esc(d.addr.replace('서울특별시 금천구 ',''))}</div>
    <button id="doneBtn-${idx}" class="complete-btn ${isDone?'':'undone'}" onclick="toggleDone(${idx})">${isDone?'✓ 조사완료 (취소)':'조사완료'}</button>
    <button onclick="closeIw();openRvAt(new kakao.maps.LatLng(${lat},${lng}))" style="width:100%;margin-top:6px;padding:6px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;cursor:pointer;background:#f8fafc;color:#334155">🔭 이 위치 로드뷰</button>
    <div style="position:absolute;top:6px;right:8px;cursor:pointer;color:#999;font-size:14px" onclick="closeIw()">✕</div>
  `;
  const iw=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(lat,lng),content:iwEl,yAnchor:1.4,zIndex:100});
  el.addEventListener('click',()=>{ if(iwOpen)iwOpen.setMap(null); iw.setMap(kakaoMap); iwOpen=iw; setActive(idx); kakaoMap.panTo(new kakao.maps.LatLng(lat,lng)); });
  const overlay=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(lat,lng),content:el,zIndex:10});
  overlay.setMap(kakaoMap);
  overlays[idx]={overlay,iw,lat,lng};
}
function closeIw(){if(iwOpen){iwOpen.setMap(null);iwOpen=null;}}

// ── 목록 ──
function renderItem(d,i,ok){
  const done=loadDone(),isDone=!!done[String(d.seq)];
  const div=document.createElement('div');
  div.className='item'+(isHidden(d)?' hidden':'')+(isDone?' done':'');
  div.id='item-'+i;
  div.innerHTML=`
    <div class="team-dot" style="background:${TEAM_COLOR[d.team]}"></div>
    <div class="ibody">
      <div class="iname">${esc(d.name)}</div>
      <div class="isub">${esc(d.addr.replace('서울특별시 금천구 ',''))}</div>
      <div class="tags">
        <span class="itag ${TEAM_CLASS[d.team]}">${d.team}</span>
        <span class="itag dong">${d.dong}</span>
        <span class="itag ${ok?TEAM_CLASS[d.team]:'err'}">${ok?d.floors:'변환실패'}</span>
        <span class="done-badge">✓ 완료</span>
      </div>
    </div>`;
  div.addEventListener('click',()=>{
    setActive(i);
    if(geocoded[i]&&kakaoMap){
      kakaoMap.setLevel(3);
      kakaoMap.panTo(new kakao.maps.LatLng(geocoded[i].lat,geocoded[i].lng));
      if(overlays[i]){if(iwOpen)iwOpen.setMap(null);overlays[i].iw.setMap(kakaoMap);iwOpen=overlays[i].iw;}
    }
  });
  document.getElementById('listEl').appendChild(div);
}

// ── 필터 ──
function isHidden(d){
  if(!filterDong.has('all')&&!filterDong.has(d.dong))return true;
  if(!filterTeam.has('all')&&!filterTeam.has(d.team))return true;
  if(filterText&&!d.name.toLowerCase().includes(filterText.toLowerCase()))return true;
  return false;
}
function applyFilter(){
  filterText=document.getElementById('searchInput').value.trim();
  let shown=0;
  RAW.forEach((d,i)=>{
    const el=document.getElementById('item-'+i);
    if(!el)return;
    const hide=isHidden(d);
    el.classList.toggle('hidden',hide);
    if(overlays[i])overlays[i].overlay.setMap(hide?null:kakaoMap);
    if(!hide)shown++;
  });
  document.getElementById('sShow') && (document.getElementById('sShow').textContent=shown);
  updateCounts();
}

function toggleDong(g){
  if(g==='all'){filterDong=new Set(['all']);}
  else{filterDong.delete('all');filterDong.has(g)?filterDong.delete(g):filterDong.add(g);if(filterDong.size===0)filterDong=new Set(['all']);}
  const isAll=filterDong.has('all');
  document.getElementById('dbtn-all').classList.toggle('active',isAll);
  ['독산동','가산동'].forEach(d=>{const b=document.getElementById('dbtn-'+d);if(b)b.classList.toggle('active',!isAll&&filterDong.has(d));});
  applyFilter();
}

function toggleTeam(g){
  if(g==='all'){filterTeam=new Set(['all']);}
  else{filterTeam.delete('all');filterTeam.has(g)?filterTeam.delete(g):filterTeam.add(g);if(filterTeam.size===0)filterTeam=new Set(['all']);}
  const isAll=filterTeam.has('all');
  document.getElementById('tbtn-all').classList.toggle('active',isAll);
  ['1팀','2팀','3팀'].forEach(t=>{const b=document.getElementById('tbtn-'+t);if(b)b.classList.toggle('active',!isAll&&filterTeam.has(t));});
  applyFilter();
}

function updateCounts(){
  const vis=RAW.filter(d=>!filterText||d.name.toLowerCase().includes(filterText.toLowerCase()));
  ['독산동','가산동'].forEach(dong=>{const el=document.getElementById('dcnt-'+dong);if(el)el.textContent=vis.filter(d=>d.dong===dong).length;});
  ['1팀','2팀','3팀'].forEach(t=>{const el=document.getElementById('tcnt-'+t);if(el)el.textContent=vis.filter(d=>d.team===t).length;});
}

function setActive(idx){
  if(activeIdx>=0)document.getElementById(`item-${activeIdx}`)?.classList.remove('active');
  activeIdx=idx;
  const el=document.getElementById(`item-${idx}`);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
}
function fitAll(){
  if(!kakaoMap)return;
  const bounds=new kakao.maps.LatLngBounds();
  Object.values(geocoded).filter(Boolean).forEach(g=>bounds.extend(new kakao.maps.LatLng(g.lat,g.lng)));
  kakaoMap.setBounds(bounds,50);
}
// ── 단일 지도 클릭 리스너 (모드 플래그로 분기) ──
function setupMapClickListener() {
  kakao.maps.event.addListener(kakaoMap, 'click', (e) => {
    if (rvMode) {
      openRvAt(e.latLng);
      setRvMode(false);
      return;
    }
    if (distMode) {
      distPath.push(e.latLng);
      addDistMarker(e.latLng);
      updateDistLine();
    }
  });
  kakao.maps.event.addListener(kakaoMap, 'dblclick', () => {
    if (distMode) finishDist();
  });
}

// ── 거리재기 ──
let distMode = false;
let distLine = null;
let distMarkers = [];
let distPath = [];

function toggleDist() {
  distMode = !distMode;
  const btn = document.getElementById('btnDist');
  const info = document.getElementById('distInfo');
  const clearBtn = document.getElementById('btnDistClear');
  if (distMode) {
    btn.classList.add('active');
    btn.textContent = '📏 거리재기 중...';
    info.style.display = 'block';
    clearBtn.style.display = 'block';
    kakaoMap.setCursor('crosshair');
    setRvMode(false); // 로드뷰 모드 해제
  } else {
    finishDist();
  }
}

function addDistMarker(pos) {
  const el = document.createElement('div');
  el.style.cssText = 'width:8px;height:8px;border-radius:50%;background:#2f81f7;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)';
  const o = new kakao.maps.CustomOverlay({position:pos,content:el,zIndex:50});
  o.setMap(kakaoMap);
  distMarkers.push(o);
}

function updateDistLine() {
  if (distLine) distLine.setMap(null);
  if (distPath.length < 2) return;
  distLine = new kakao.maps.Polyline({
    map:kakaoMap, path:distPath,
    strokeWeight:3, strokeColor:'#2f81f7',
    strokeOpacity:.9, strokeStyle:'solid'
  });
  const m = Math.round(distLine.getLength());
  document.getElementById('distVal').textContent = m >= 1000 ? (m/1000).toFixed(2)+'km' : m+'m';
}

function finishDist() {
  distMode = false;
  document.getElementById('btnDist').classList.remove('active');
  document.getElementById('btnDist').textContent = '📏 거리재기';
  kakaoMap.setCursor('');
}

function clearDist() {
  if (distLine) { distLine.setMap(null); distLine = null; }
  distMarkers.forEach(m => m.setMap(null));
  distMarkers = []; distPath = [];
  document.getElementById('distVal').textContent = '0';
  document.getElementById('distInfo').style.display = 'none';
  document.getElementById('btnDistClear').style.display = 'none';
  finishDist();
}

// ── 로드뷰 ──
let rvMode = false;
let rvInstance = null;

function setRvMode(on) {
  rvMode = on;
  const btn = document.getElementById('btnRv');
  if (on) {
    btn.classList.add('active-rv');
    btn.textContent = '🔭 위치 클릭...';
    kakaoMap.setCursor('crosshair');
    distMode = false; // 거리재기 모드 해제
  } else {
    btn.classList.remove('active-rv');
    btn.textContent = '🔭 로드뷰';
    kakaoMap.setCursor('');
  }
}

function openRvMode() {
  setRvMode(!rvMode); // 토글
}

function openRvAt(latLng) {
  const panel = document.getElementById('rvPanel');
  panel.style.display = 'flex';
  document.getElementById('rvHint').textContent =
    `${latLng.getLat().toFixed(5)}, ${latLng.getLng().toFixed(5)}`;
  const container = document.getElementById('rvMap');
  if (!rvInstance) rvInstance = new kakao.maps.Roadview(container);
  const client = new kakao.maps.RoadviewClient();
  client.getNearestPanoId(latLng, 50, (panoId) => {
    if (panoId) {
      rvInstance.setPanoId(panoId, latLng);
    } else {
      document.getElementById('rvHint').textContent = '이 위치 근처에 로드뷰가 없습니다';
    }
  });
}

function closeRv() {
  document.getElementById('rvPanel').style.display = 'none';
  setRvMode(false);
}

function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;setTimeout(()=>t.className='toast',4000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// 초기화
window.addEventListener('DOMContentLoaded',()=>{
  updateCounts();
  updateDoneCount();
});

// ESC 키로 로드뷰 닫기 / 거리재기 취소 / 로드뷰 모드 취소
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('rvPanel').style.display !== 'none') { closeRv(); return; }
    if (rvMode) { closeRvMode(); return; }
    if (distMode) { finishDist(); return; }
  }
});
</script>
</body>
</html>
