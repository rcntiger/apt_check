<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>아파트 점검 지도</title>
<style>
:root{--bg:#0d1117;--sur:#161b22;--sur2:#21262d;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);--tx:#e6edf3;--mt:#7d8590;--ac:#2f81f7;--hi:#ff7b72;--lo:#3fb950;--t1:#3b82f6;--t2:#ef4444;--t3:#a78bfa;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 16px;background:var(--sur);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:28px;height:28px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
h1{font-size:14px;font-weight:600}
.badge{font-size:10px;padding:2px 8px;border-radius:20px}
.badge.sub{background:rgba(47,129,247,.12);border:1px solid rgba(47,129,247,.3);color:var(--ac)}
.badge.cnt{margin-left:auto;background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--lo)}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:300px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:600px){.layout{flex-direction:column}.sidebar{width:100%;height:auto;max-height:44vh;border-right:none;border-bottom:1px solid var(--bd);overflow-y:auto;flex-shrink:0}.map-wrap{flex:1;min-height:0}#map{width:100%;height:100%}.map-toolbar{top:6px;right:6px;gap:4px;flex-direction:column}.tool-btn{padding:5px 9px;font-size:11px}}
.map-wrap{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%;min-height:0}
.map-ph{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--mt);font-size:13px}
.map-ph .big{font-size:36px;opacity:.25}
.panel{padding:10px 12px;border-bottom:1px solid var(--bd)}
.ptitle{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mt);margin-bottom:7px}
.pgwrap{height:3px;background:var(--sur2);border-radius:2px;overflow:hidden;margin-top:7px;display:none}
.pgfill{height:100%;background:var(--ac);border-radius:2px;transition:width .1s;width:0}
.pglabel{font-size:10px;color:var(--mt);margin-top:4px;text-align:center;display:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stats-row{display:flex;gap:4px;margin-top:8px}
.stat{flex:1;background:var(--sur2);border-radius:6px;padding:6px 4px;text-align:center}
.stat .n{font-size:14px;font-weight:700}
.stat .l{font-size:9px;color:var(--mt);margin-top:1px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{padding:4px 9px;border-radius:20px;border:1px solid var(--bd2);background:var(--sur2);color:var(--mt);font-size:11px;cursor:pointer;transition:all .12s;user-select:none}
.fbtn.active{color:#fff;border-color:transparent}
.fall.active{background:var(--ac)}.ft1.active{background:var(--t1);color:#fff}.ft2.active{background:var(--t2)}.ft3.active{background:var(--t3)}.fd.active{background:var(--dc,var(--ac))}
.dcnt{opacity:.7;font-size:10px;margin-left:1px}
.search-wrap input{width:100%;background:var(--sur2);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;padding:7px 9px;font-size:12px;outline:none}
.search-wrap input:focus{border-color:var(--ac)}
.list{flex:1;overflow-y:auto;padding:5px}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.item{padding:7px 10px;border-radius:var(--r);margin-bottom:3px;cursor:pointer;transition:all .12s;display:flex;align-items:flex-start;gap:7px;border:1px solid transparent}
.item:hover{background:var(--sur2)}
.item.active{background:rgba(47,129,247,.1);border-color:rgba(47,129,247,.25)}
.item.hidden{display:none}
.item.done .iname{color:#22c55e}
.item.done .done-badge{display:inline}
.team-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ibody{flex:1;min-width:0}
.iname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.isub{font-size:10px;color:var(--mt);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tags{margin-top:3px;display:flex;gap:3px;flex-wrap:wrap}
.itag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.itag.t1{background:rgba(245,158,11,.15);color:var(--t1)}.itag.t2{background:rgba(239,68,68,.15);color:var(--t2)}.itag.t3{background:rgba(167,139,250,.15);color:var(--t3)}
.itag.err{background:rgba(255,123,114,.1);color:var(--hi)}.itag.dong{background:rgba(255,255,255,.07);color:var(--mt)}
.done-badge{display:none;font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(34,197,94,.15);color:#22c55e;font-weight:600}
.map-toolbar{position:absolute;top:10px;right:10px;z-index:9999;display:none;flex-direction:column;gap:6px;pointer-events:auto}
.tool-btn{padding:7px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;background:var(--sur);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.4);white-space:nowrap;pointer-events:auto;position:relative;z-index:9999}
.tool-btn:hover{background:var(--sur2)}
.tool-btn.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.tool-btn.on-rv{background:#22c55e;color:#fff;border-color:#22c55e}
.tool-btn.on-sat{background:#7c3aed;color:#fff;border-color:#7c3aed}
.dist-info{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:8px 16px;font-size:12px;z-index:9999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.5);text-align:center;white-space:nowrap}
.dist-info span{color:var(--ac);font-weight:700;font-size:14px}
.rv-panel{position:absolute;inset:0;z-index:200;display:none;flex-direction:column}
.rv-header{background:var(--sur);border-bottom:1px solid var(--bd);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#rvMap{flex:1}
.mob-toggle{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--ac);color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4)}
@media(max-width:600px){.mob-toggle{display:block}}
@media(max-width:600px){.sidebar.map-mode{display:none!important}.map-wrap.list-mode{display:none!important}}
/* 경로 최적화 */

.route-panel h4{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--tx)}
.toast{position:fixed;bottom:16px;right:16px;background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:9px 14px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:9999;transform:translateY(50px);opacity:0;transition:all .25s;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--lo)}.toast.err{border-color:var(--hi)}
.kk-marker{width:11px;height:11px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.6);cursor:pointer;transition:all .2s}
.kk-marker.active-mk{width:18px!important;height:18px!important;border:3px solid #fff!important;box-shadow:0 0 0 3px rgba(255,255,255,.5),0 3px 10px rgba(0,0,0,.7)!important;z-index:999!important;transform:scale(1)}
.kk-marker:hover{transform:scale(1.5)}
.kk-marker.t1{background:var(--t1)}.kk-marker.t2{background:var(--t2)}.kk-marker.t3{background:var(--t3)}
.kk-marker.done{background:#22c55e!important;width:13px!important;height:13px!important}
.kk-marker.excl{background:#374151!important;opacity:.85;width:11px!important;height:11px!important;border:2px solid #9ca3af!important}
.kk-marker.excl:hover{opacity:1;transform:scale(1.4)}
.edu-marker{width:22px;height:22px;border-radius:5px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;background:#0ea5e9}
.edu-marker:hover{transform:scale(1.2)}
#diagPanel{display:none;position:absolute;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;padding:24px}
.diag-box{background:var(--sur);border:1px solid rgba(255,123,114,.35);border-radius:14px;padding:24px 28px;max-width:460px;width:100%}
</style>
</head>
<body>
<header>
  <div class="logo">🚒</div>
  <h1>금천구 아파트 조사 대상</h1>
  <span class="badge sub">서울 금천구</span>
  <span class="badge cnt">85개소</span>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="panel" id="statsPanel">
      <div class="pgwrap" id="pgWrap"><div class="pgfill" id="pgFill"></div></div>
      <div class="pglabel" id="pgLabel"></div>
      <div class="stats-row" id="statsInner">
        <div class="stat"><div class="n" id="sTotal" style="color:var(--ac)">0</div><div class="l">전체</div></div>
        <div class="stat"><div class="n" id="sOk" style="color:var(--lo)">0</div><div class="l">변환</div></div>
        <div class="stat"><div class="n" id="sFail" style="color:var(--hi)">0</div><div class="l">실패</div></div>
        <div class="stat"><div class="n" id="doneCount" style="color:#22c55e">0</div><div class="l">조사완료</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="ptitle">📍 행정동</div>
      <div class="filter-row">
        <span class="fbtn fall active" id="dbtn-all" onclick="toggleDong('all')">전체</span>
        <span class="fbtn fd" id="dbtn-독산동" onclick="toggleDong('독산동')" style="--dc:#60a5fa">독산동 <span class="dcnt" id="dcnt-독산동"></span></span>
        <span class="fbtn fd" id="dbtn-가산동" onclick="toggleDong('가산동')" style="--dc:#34d399">가산동 <span class="dcnt" id="dcnt-가산동"></span></span>
      </div>
    </div>
    <div class="panel">
      <div class="ptitle">👥 조사팀</div>
      <div class="filter-row">
        <span class="fbtn fall active" id="tbtn-all" onclick="toggleTeam('all')">전체</span>
        <span class="fbtn ft1" id="tbtn-1팀" onclick="toggleTeam('1팀')">🔵 1팀 <span class="dcnt" id="tcnt-1팀"></span></span>
        <span class="fbtn ft2" id="tbtn-2팀" onclick="toggleTeam('2팀')">🔴 2팀 <span class="dcnt" id="tcnt-2팀"></span></span>
        <span class="fbtn ft3" id="tbtn-3팀" onclick="toggleTeam('3팀')">🟣 3팀 <span class="dcnt" id="tcnt-3팀"></span></span>
      </div>
    </div>
    <div class="panel">
      <div class="ptitle">🔍 검색</div>
      <div class="search-wrap"><input type="text" id="searchInput" placeholder="단지명 검색..." oninput="applyFilter()"></div>
    </div>
    <div class="list" id="listEl">
      <div style="text-align:center;color:var(--mt);font-size:12px;padding:24px 12px;line-height:1.9">⏳ 지도 로딩 중...<br><span style="font-size:10px;color:#444">잠시만 기다려주세요</span></div>
    </div>
    <!-- 교육시설 목록 (토글 시 표시) -->
    <div id="eduListWrap" style="display:none;flex-direction:column;border-top:1px solid var(--bd)">
      <div class="panel" style="padding:8px 12px">
        <div class="ptitle">🏫 교육시설 목록</div>
      </div>
      <div class="list" id="eduListEl"></div>
    </div>
  </div>
  <div class="map-wrap">
    <div class="map-ph" id="mapPh"><div class="big">🗺️</div><div>지도 로딩 중...</div></div>
    <div id="map"></div>
    <div class="map-toolbar" id="mapToolbar">
      <button class="tool-btn" id="btnEdu" onclick="toggleEdu()">🏫 교육시설</button>
      <button class="tool-btn" id="btnExcl" onclick="toggleExcluded()">⚫ 제외 대상</button>
      <button class="tool-btn" id="btnSat" onclick="toggleSat()">🛰️ 위성</button>
      <button class="tool-btn" id="btnDist" onclick="toggleDist()">📏 거리재기</button>
      <button class="tool-btn" id="btnRv" onclick="toggleRvMode()">🔭 로드뷰</button>
      <button class="tool-btn" id="btnDistClear" onclick="clearDist()" style="display:none;font-size:11px;color:var(--hi)">✕ 거리초기화</button>
    </div>
    <div class="dist-info" id="distInfo">클릭: 측정점 추가 &nbsp;|&nbsp; 더블클릭: 완료<br>총 거리: <span id="distVal">0</span></div>
    <div class="rv-panel" id="rvPanel">
      <div class="rv-header">
        <span style="font-size:13px;font-weight:600;flex:1">🔭 로드뷰</span>
        <span style="font-size:11px;color:var(--mt)" id="rvHint"></span>
        <button onclick="closeRv()" style="padding:6px 14px;background:#ef4444;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-left:12px">← 지도로 돌아가기</button>
      </div>
      <div id="rvMap"></div>
    </div>
    <div id="diagPanel">
      <div class="diag-box">
        <div style="font-size:15px;font-weight:700;color:var(--hi);margin-bottom:10px" id="diagTitle"></div>
        <div style="font-size:13px;color:var(--mt);margin-bottom:14px;line-height:1.6" id="diagDesc"></div>
        <div style="background:var(--sur2);border-radius:8px;padding:14px 16px;font-size:12px;line-height:2.2;color:var(--tx)" id="diagFix"></div>
        <div style="margin-top:12px;padding:10px 14px;background:rgba(47,129,247,.08);border:1px solid rgba(47,129,247,.2);border-radius:8px;font-size:11px;color:var(--mt)">현재 주소: <code style="color:var(--ac)" id="diagOrigin"></code></div>
        <button onclick="document.getElementById('diagPanel').style.display='none'" style="margin-top:12px;width:100%;padding:9px;background:var(--sur2);border:1px solid var(--bd2);border-radius:8px;color:var(--mt);cursor:pointer;font-size:12px">닫기</button>
      </div>
    </div>
  </div>
</div>
<button class="mob-toggle" id="mobToggle" onclick="toggleMobView()">🗺️ 지도 보기</button>
<div class="toast" id="toast"></div>

    console.warn('Supabase 로드 실패, 로컬 캐시 사용:', e.message);
    return loadStore(DONE_KEY);
  }
}

async function sbSetDone(d, isDone) {
  try {
    if (isDone) {
      await fetch(SB_URL + '/rest/v1/' + SB_TABLE, {
        method: 'POST',
        headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ seq: d.seq, name: d.name, team: d.team })
      });
    } else {
      await fetch(
        SB_URL + '/rest/v1/' + SB_TABLE + '?seq=eq.' + d.seq,
        { method: 'DELETE', headers: SB_HEADERS }
      );
    }
  } catch(e) {
    console.warn('Supabase 저장 실패:', e.message);
    showToast('서버 저장 실패 (로컬만 적용)', 'err');
  }
}

// 스토리지 헬퍼
function loadStore(key){try{return JSON.parse(localStorage.getItem(key)||'{}')}catch{return{}}}
function saveStore(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch{}}
function loadDone(){return loadStore(DONE_KEY)}
function saveDone(d){saveStore(DONE_KEY,d)}
function toggleDone(idx){

// 캐시
function loadCache(){return loadStore(CACHE_KEY)}
function saveCache(c){saveStore(CACHE_KEY,c)}

// 주소 정제
function cleanRoad(r){r=r.trim();r=r.replace(/\s*[（(（].*/,'');r=r.replace(/\s+[가-힣]{2,}.+$/,'');r=r.replace(/\s+\d+동$/,'').replace(/\s+\d+호$/,'');return r.trim();}
function cleanJibun(a){a=a.replace(/\s+/g,' ').trim();a=a.replace(/\s*외\s*\d+필지.*/,'');a=a.replace(/(\d+-\d+)\s*산$/,'산$1');a=a.replace(/(\d+)-0\b/,'$1');a=a.replace(/\s*[,(（*].*/,'');return a.trim();}

// Kakao REST
async function kakaoAddr(q,key){const r=await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(q)}&size=1`,{headers:{Authorization:`KakaoAK ${key}`}});if(!r.ok)return null;const d=await r.json();return d.documents?.[0]?{lat:+d.documents[0].y,lng:+d.documents[0].x}:null;}
async function kakaoKw(q,key){const r=await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(q)}&size=1`,{headers:{Authorization:`KakaoAK ${key}`}});if(!r.ok)return null;const d=await r.json();return d.documents?.[0]?{lat:+d.documents[0].y,lng:+d.documents[0].x}:null;}
async function geocodeOne(d,key){
  const rd=cleanRoad(d.addr_road);
  if(rd){const g=await kakaoAddr('서울 금천구 '+rd,key);if(g)return g;}
  const g2=await kakaoAddr(cleanJibun(d.addr),key);if(g2)return g2;
  return await kakaoKw('서울 금천구 '+d.name.replace(/[（(].*/,'').trim(),key);
}

// 지도
function initKakaoMap(jsKey){
  if(kakaoMap)return Promise.resolve();
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>reject(new Error('TIMEOUT')),10000);
    const s=document.createElement('script');
    s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${jsKey}&autoload=false&libraries=services`;
    s.onerror=()=>{clearTimeout(timer);reject(new Error('SCRIPT_LOAD'));};
    s.onload=()=>{
      kakao.maps.load(()=>{
        clearTimeout(timer);
        try{
          document.getElementById('mapPh').style.display='none';
          kakaoMap=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(37.463,126.900),level:5});
          document.getElementById('mapToolbar').style.display='flex';
          setupListeners();resolve();
        }catch(e){reject(new Error('MAP_CREATE'));}
      });
    };
    document.head.appendChild(s);
  });
}
function setupListeners(){
  kakao.maps.event.addListener(kakaoMap,'click',(e)=>{
    if(rvMode){openRvAt(e.latLng);setRvMode(false);return;}
    if(distMode){distPath.push(e.latLng);addDistMarker(e.latLng);updateDistLine();}
  });
  kakao.maps.event.addListener(kakaoMap,'dblclick',()=>{if(distMode)finishDist();});
}
function showDiag(code){
  const origin=location.origin;

  const m=msgs[code]||{title:'오류: '+code,desc:'',fix:'새로고침하세요.'};

// 메인 로드
async function startLoad(){
  const jsKey=JS_KEY;
  const restKey=REST_KEY;
  document.getElementById('pgWrap').style.display='block';
  document.getElementById('pgLabel').style.display='block';

  document.getElementById('listEl').innerHTML='<div style="text-align:center;color:var(--mt);font-size:12px;padding:24px 12px;line-height:1.9">⏳ 지도 로딩 중...<br><span style=\"font-size:10px;color:#444\">잠시만 기다려주세요</span></div>';
  try{await initKakaoMap(jsKey);}
  catch(e){
      document.getElementById('pgWrap').style.display='none';
    document.getElementById('pgLabel').style.display='none';

    showDiag(e.message);return;
  }
  // 금천소방서 좌표 자동 취득 (키워드 검색)
  try {
    const fsRes = await fetch(
      'https://dapi.kakao.com/v2/local/search/keyword.json?query=' +
      encodeURIComponent('금천소방서') + '&size=1',
      { headers: { Authorization: 'KakaoAK ' + REST_KEY } }
    );
    const fsData = await fsRes.json();
    if (fsData.documents?.[0]) {
      FS_LAT = +fsData.documents[0].y;
      FS_LNG = +fsData.documents[0].x;
      console.log('금천소방서 좌표:', FS_LAT, FS_LNG);
    }
  } catch(e) { console.warn('소방서 좌표 취득 실패, 기본값 사용'); }

  const cache=loadCache();
  // Supabase에서 완료 상태 로드 (실패 시 로컬 캐시 사용)
  showToast('서버에서 완료 현황 불러오는 중...', '');
  const doneMapInit = await sbLoadDone();
  let ok=0,fail=0;
  for(let i=0;i<RAW.length;i++){
    const d=RAW[i];
    document.getElementById('pgFill').style.width=((i+1)/RAW.length*100)+'%';
    document.getElementById('pgLabel').textContent=`${i+1}/${RAW.length} [${d.team}] ${d.name}`;
    document.getElementById('sTotal').textContent=i+1;
    const ck=String(d.seq);let geo=null;
    if(cache[ck]){geo=cache[ck]==='fail'?null:cache[ck];}
    else{try{geo=await geocodeOne(d,restKey);}catch{}cache[ck]=geo||'fail';if(i%10===0)saveCache(cache);await sleep(80);}
    geocoded[i]=geo;
    if(geo){ok++;addMarker(i,geo.lat,geo.lng,d,doneMapInit);}else fail++;
    renderItem(d,i,!!geo,doneMapInit);
    document.getElementById('sOk').textContent=ok;
    document.getElementById('sFail').textContent=fail;
  }
  saveCache(cache);
  document.getElementById('pgWrap').style.display='none';
  document.getElementById('pgLabel').style.display='none';
  const doneMap=loadDone();
  RAW.forEach((_,i)=>{if(doneMap[String(RAW[i].seq)])applyDoneState(i,true);});
  updateDoneCount();applyFilter();fitAll();
  showToast(`완료 ✓ ${ok}개 성공 / ${fail}개 실패`,ok>fail?'ok':'err');
}

async function loadEduMarkers() {
  const btn = document.getElementById('btnEdu');
  btn.textContent = '⏳ 로딩 중...';
  btn.style.pointerEvents = 'none';

  const key = REST_KEY;
  const headers = { Authorization: `KakaoAK ${key}` };
  let ok = 0;

  for (const d of EDU_RAW) {
    try {
      const r = await fetch(
        `https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(d.addr)}&size=1`,
        { headers }
      );
      const j = await r.json();
      if (j.documents?.[0]) {
        d._lat = +j.documents[0].y;
        d._lng = +j.documents[0].x;
        addEduMarker(d); ok++;
      } else {
        // 키워드 검색 폴백
        const r2 = await fetch(
          `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent('금천구 '+d.name)}&size=1`,
          { headers }
        );
        const j2 = await r2.json();
        if (j2.documents?.[0]) {
          d._lat = +j2.documents[0].y;
          d._lng = +j2.documents[0].x;
          addEduMarker(d); ok++;
        }
      }
    } catch(e) {}
    await sleep(80);
  }

  eduLoaded = true;
  btn.style.pointerEvents = 'auto';
  renderEduList();
  showToast(`🏫 교육시설 ${ok}개 표시 완료`, 'ok');
  btn.textContent = '🏫 교육시설 ON';
  btn.classList.add('on');
}

function toggleEdu() {
  const btn = document.getElementById('btnEdu');
  const wrap = document.getElementById('eduListWrap');
  if (eduOn) {
    eduOverlays.forEach(o => o.overlay.setMap(null));
    eduOn = false;
    btn.classList.remove('on');
    btn.textContent = '🏫 교육시설';
    wrap.style.display = 'none';
  } else {
    eduOn = true;
    if (!eduLoaded) {
      loadEduMarkers();
    } else {
      eduOverlays.forEach(o => o.overlay.setMap(kakaoMap));
      btn.textContent = '🏫 교육시설 ON';
      btn.classList.add('on');
      wrap.style.display = 'flex';
    }
  }
}

  EDU_RAW.forEach((d, i) => {
    if (!d._lat) return;
    const icon = EDU_TYPE_ICON[d.detail] || '🏫';
    const div = document.createElement('div');
    div.className = 'item';
    div.style.borderLeft = '3px solid #0ea5e9';
    div.innerHTML = `
      <div class="ibody">
        <div class="iname">${icon} ${esc(d.name)}</div>
        <div class="isub">${d.detail} · ${esc(d.addr.replace('서울특별시 금천구 ',''))}</div>
      </div>`;
    div.addEventListener('click', () => {
      if (kakaoMap) {
        kakaoMap.setLevel(3);
        kakaoMap.panTo(new kakao.maps.LatLng(d._lat, d._lng));
        if (eduOverlays[i]) {
          if (iwOpen) iwOpen.setMap(null);
          eduOverlays[i].iw.setMap(kakaoMap);
          iwOpen = eduOverlays[i].iw;
        }
      }
    });
    listEl.appendChild(div);
  });
  wrap.style.display = 'flex';
}



// 제외 대상 레이어
let exclMarkers = {'1팀':[],'2팀':[],'3팀':[]}, exclIws = [], exclLoaded = false, exclOn = false;

function applyExclFilter() {
  if (!exclLoaded || !exclOn) return;
  const isAll = filterTeam.has('all');
  ['1팀','2팀','3팀'].forEach(team => {
    const show = isAll || filterTeam.has(team);
    (exclMarkers[team] || []).forEach(o => o.setMap(show ? kakaoMap : null));
  });
}

function toggleExcluded() {
  const btn = document.getElementById('btnExcl');
  if (exclOn) {
    Object.values(exclMarkers).flat().forEach(o=>o.setMap(null));
    if(iwOpen){iwOpen.setMap(null);iwOpen=null;}
    exclOn = false;
    btn.classList.remove('on');
    btn.textContent = '⚫ 제외 대상';
  } else {
    if (!exclLoaded) loadExcluded();
    else { applyExclFilter(); }
    exclOn = true;
    btn.classList.add('on');
    btn.textContent = '⚫ 제외 대상 ON';
  }
}

async function loadExcluded() {
  const key = REST_KEY;
  const headers = { Authorization: `KakaoAK ${key}` };
  let ok = 0;
  for (const d of EXCLUDED) {
    try {
      let geo = null;
      // 도로명 주소로 먼저 시도
      const rd = d.addr_road ? d.addr_road.trim() : '';
      if (rd) {
        const r = await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent('서울 금천구 ' + rd)}&size=1`, { headers });
        const j = await r.json();
        if (j.documents?.[0]) geo = { lat: +j.documents[0].y, lng: +j.documents[0].x };
      }
      // 지번 주소 폴백
      if (!geo && d.addr) {
        const r = await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(d.addr)}&size=1`, { headers });
        const j = await r.json();
        if (j.documents?.[0]) geo = { lat: +j.documents[0].y, lng: +j.documents[0].x };
      }
      if (!geo) continue;

      // 마커
      const el = document.createElement('div');
      el.className = `kk-marker excl ${d.team === '1팀' ? 't1' : d.team === '2팀' ? 't2' : 't3'}`;
      el.style.opacity = '0.9';

      // 팝업
      const iwEl = document.createElement('div');
      iwEl.style.cssText = 'background:#fff;border-radius:8px;padding:10px 14px;min-width:200px;box-shadow:0 4px 16px rgba(0,0,0,.2);font-family:sans-serif';
      iwEl.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:9px;font-weight:700;color:#9ca3af;background:#f3f4f6;padding:2px 7px;border-radius:10px">${d.team} 제외 대상</span>
          <span style="cursor:pointer;color:#999;font-size:16px" onclick="closeIw()">✕</span>
        </div>
        <div style="font-size:13px;font-weight:700;margin-bottom:4px;color:#374151">${esc(d.name)}</div>
        <div style="font-size:11px;color:#9ca3af;margin-bottom:2px">📍 ${d.dong} · ${d.floors} · ${d.buildings}</div>
        <div style="font-size:10px;color:#d1d5db;margin-top:6px;padding-top:6px;border-top:1px solid #f3f4f6">이번 점검 대상에서 제외됨</div>`;

      const iw = new kakao.maps.CustomOverlay({ position: new kakao.maps.LatLng(geo.lat, geo.lng), content: iwEl, yAnchor: 1.4, zIndex: 5 });
      el.addEventListener('click', () => {
        if (iwOpen) iwOpen.setMap(null);
        iw.setMap(kakaoMap); iwOpen = iw;
        kakaoMap.panTo(new kakao.maps.LatLng(geo.lat, geo.lng));
      });
      const ov = new kakao.maps.CustomOverlay({ position: new kakao.maps.LatLng(geo.lat, geo.lng), content: el, zIndex: 5 });
      ov.setMap(kakaoMap);
      exclMarkers[d.team] = exclMarkers[d.team] || [];
      exclMarkers[d.team].push(ov);
      exclIws.push(iw);
      ok++;
    } catch(e) {}
    await sleep(80);
  }
  exclLoaded = true;
  showToast(`제외 대상 ${ok}개 표시`, 'ok');
}

// 위성지도
let satMode = false;
function toggleSat() {
  satMode = !satMode;
  const btn = document.getElementById('btnSat');
  if (satMode) {
    kakaoMap.setMapTypeId(kakao.maps.MapTypeId.HYBRID); // 위성+레이블
    btn.classList.add('on-sat');
    btn.textContent = '🗺️ 일반지도';
  } else {
    kakaoMap.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
    btn.classList.remove('on-sat');
    btn.textContent = '🛰️ 위성';
  }
}

// 거리재기
function toggleDist(){distMode=!distMode;const btn=document.getElementById('btnDist');if(distMode){btn.classList.add('on');btn.textContent='📏 거리재기 중...';document.getElementById('distInfo').style.display='block';document.getElementById('btnDistClear').style.display='block';kakaoMap.setCursor('crosshair');setRvMode(false);}else finishDist();}
function addDistMarker(pos){const el=document.createElement('div');el.style.cssText='width:8px;height:8px;border-radius:50%;background:#2f81f7;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)';const o=new kakao.maps.CustomOverlay({position:pos,content:el,zIndex:50});o.setMap(kakaoMap);distMarkers.push(o);}
function updateDistLine(){if(distLine)distLine.setMap(null);if(distPath.length<2)return;distLine=new kakao.maps.Polyline({map:kakaoMap,path:distPath,strokeWeight:3,strokeColor:'#2f81f7',strokeOpacity:.9,strokeStyle:'solid'});const m=Math.round(distLine.getLength());document.getElementById('distVal').textContent=m>=1000?(m/1000).toFixed(2)+'km':m+'m';}
function finishDist(){distMode=false;document.getElementById('btnDist').classList.remove('on');document.getElementById('btnDist').textContent='📏 거리재기';if(kakaoMap)kakaoMap.setCursor('');}
function clearDist(){if(distLine){distLine.setMap(null);distLine=null;}distMarkers.forEach(m=>m.setMap(null));distMarkers=[];distPath=[];document.getElementById('distVal').textContent='0';document.getElementById('distInfo').style.display='none';document.getElementById('btnDistClear').style.display='none';finishDist();}

// 로드뷰
function setRvMode(on){rvMode=on;const btn=document.getElementById('btnRv');if(on){btn.classList.add('on-rv');btn.textContent='🔭 위치 클릭...';kakaoMap.setCursor('crosshair');distMode=false;finishDist();}else{btn.classList.remove('on-rv');btn.textContent='🔭 로드뷰';if(kakaoMap)kakaoMap.setCursor('');}}
function toggleRvMode(){setRvMode(!rvMode);}
function openRvAt(latLng){
  const panel=document.getElementById('rvPanel');panel.style.display='flex';
  // 툴바를 rv-header 아래로 이동
  const tb=document.getElementById('mapToolbar');
  if(tb) tb.style.top='56px';document.getElementById('rvHint').textContent=`${latLng.getLat().toFixed(5)}, ${latLng.getLng().toFixed(5)}`;const container=document.getElementById('rvMap');if(!rvInstance)rvInstance=new kakao.maps.Roadview(container);const client=new kakao.maps.RoadviewClient();client.getNearestPanoId(latLng,50,(panoId)=>{if(panoId)rvInstance.setPanoId(panoId,latLng);else document.getElementById('rvHint').textContent='이 위치 근처에 로드뷰가 없습니다';});}
function openRvFromPopup(latLng) {
  lastIw = iwOpen; // 현재 팝업 저장
  closeIw();
  openRvAt(latLng);
}

function closeRv(){
  document.getElementById('rvPanel').style.display='none';
  setRvMode(false);
  // 툴바 위치 원복
  const tb=document.getElementById('mapToolbar');
  if(tb) tb.style.top='10px';
  // 이전 팝업 복원
  if(lastIw && kakaoMap){
    lastIw.setMap(kakaoMap);
    iwOpen = lastIw;
    lastIw = null;
  }
}

// 유틸
// 카카오맵 길찾기
// 금천소방서 좌표 (startLoad 시 자동 geocoding으로 갱신)
let FS_LAT = 37.456287;
let FS_LNG = 126.894847;
const FS_NAME = encodeURIComponent('금천소방서');

function openNavi(toLat, toLng, toName) {
  const url = 'https://map.kakao.com/link/from/'
    + FS_NAME + ',' + FS_LAT + ',' + FS_LNG
    + '/to/' + encodeURIComponent(toName) + ',' + toLat + ',' + toLng;
  window.open(url, '_blank');
}

// 모바일 뷰 토글
let mobMapMode = false;
function toggleMobView() {
  mobMapMode = !mobMapMode;
  const sidebar = document.querySelector('.sidebar');
  const mapWrap = document.querySelector('.map-wrap');
  const btn = document.getElementById('mobToggle');
  if (mobMapMode) {
    sidebar.classList.add('map-mode');
    mapWrap.classList.remove('list-mode');
    btn.textContent = '📋 목록 보기';
    if (kakaoMap) setTimeout(() => kakaoMap.relayout(), 100);
  } else {
    sidebar.classList.remove('map-mode');
    btn.textContent = '🗺️ 지도 보기';
  }
}

function clearRoadHighlight(){
  roadPolylines.forEach(p=>p.setMap(null)); roadPolylines=[];
  if(roadLabelOverlay){roadLabelOverlay.setMap(null);roadLabelOverlay=null;}
}

function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;setTimeout(()=>t.className='toast',4000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
